<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RepoMind - AI Repository Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
        }

        h1 {
            font-size: 3em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 1.2em;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.12);
        }

        input[type="text"]::placeholder {
            color: #888;
        }

        button {
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            margin: 20px 0;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            display: none;
        }

        .results.active {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .panel:hover {
            border-color: rgba(102, 126, 234, 0.5);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .panel h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-icon {
            font-size: 1.2em;
        }

        .panel-content {
            color: #d0d0d0;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .module-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }

        .module-name {
            font-weight: 600;
            color: #fff;
            margin-bottom: 5px;
        }

        .module-desc {
            color: #b0b0b0;
            font-size: 0.95em;
        }

        .chat-section {
            display: none;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 20px;
        }

        .chat-section.active {
            display: block;
        }

        .chat-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-messages {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .chat-message {
            margin-bottom: 15px;
            padding: 12px 15px;
            border-radius: 10px;
            max-width: 80%;
        }

        .chat-message.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-left: auto;
            text-align: right;
        }

        .chat-message.assistant {
            background: rgba(255, 255, 255, 0.08);
            margin-right: auto;
        }

        .chat-input-group {
            display: flex;
            gap: 10px;
        }

        .chat-input-group input {
            flex: 1;
        }

        .chat-input-group button {
            padding: 15px 30px;
        }

        .error {
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid rgba(255, 59, 48, 0.3);
            color: #ff6b6b;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }

        .error.active {
            display: block;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.5);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.7);
        }

        @media (max-width: 768px) {
            .results.active {
                grid-template-columns: 1fr;
            }

            .input-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 RepoMind</h1>
            <p class="subtitle">AI-Powered Repository Analysis</p>
        </header>

        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="repoUrl" 
                    placeholder="Enter GitHub repository URL (e.g., https://github.com/user/repo)"
                    value=""
                />
                <button id="analyzeBtn" onclick="analyzeRepo()">Analyze</button>
            </div>
        </div>

        <div class="error" id="errorMsg"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing repository... This may take a moment.</p>
        </div>

        <div class="results" id="results">
            <div class="panel">
                <h2><span class="panel-icon">🏗️</span> Architecture Summary</h2>
                <div class="panel-content" id="architectureContent"></div>
            </div>

            <div class="panel">
                <h2><span class="panel-icon">📦</span> Module Breakdown</h2>
                <div class="panel-content" id="moduleContent"></div>
            </div>

            <div class="panel" style="grid-column: 1 / -1;">
                <h2><span class="panel-icon">🔄</span> Key Flows</h2>
                <div class="panel-content" id="flowsContent"></div>
            </div>
        </div>

        <div class="chat-section" id="chatSection">
            <h2><span class="panel-icon">💬</span> Ask Questions About This Repository</h2>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-group">
                <input 
                    type="text" 
                    id="chatInput" 
                    placeholder="Ask anything about the repository..."
                    onkeypress="handleChatKeyPress(event)"
                />
                <button onclick="sendChatMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000';
        let currentRepoUrl = '';

        async function analyzeRepo() {
            const repoUrl = document.getElementById('repoUrl').value.trim();
            
            if (!repoUrl) {
                showError('Please enter a GitHub repository URL');
                return;
            }

            // Validate GitHub URL format
            if (!repoUrl.includes('github.com')) {
                showError('Please enter a valid GitHub repository URL');
                return;
            }

            currentRepoUrl = repoUrl;
            hideError();
            showLoading(true);
            hideResults();

            try {
                const response = await fetch(`${API_BASE}/analyze`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ github_url: repoUrl })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.detail || `HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                
                // Check if there's an error in the response
                if (data.error) {
                    throw new Error(data.error);
                }
                
                displayResults(data);
                showLoading(false);
            } catch (error) {
                showLoading(false);
                const errorMessage = error.message || String(error);
                showError(`Error: ${errorMessage}`);
                console.error('Analysis error:', error);
            }
        }

        function displayResults(data) {
            // Store repo data for chat functionality
            currentRepoData = {
                file_tree: data.file_tree || [],
                file_contents: data.file_contents || {}
            };

            // Architecture Summary
            const architectureContent = document.getElementById('architectureContent');
            architectureContent.textContent = data.architecture_summary || 'No architecture summary available';

            // Module Breakdown - backend returns a string, not an array
            const moduleContent = document.getElementById('moduleContent');
            if (data.module_breakdown && data.module_breakdown.trim()) {
                moduleContent.textContent = data.module_breakdown;
            } else {
                moduleContent.textContent = 'No module information available';
            }

            // Key Flows
            const flowsContent = document.getElementById('flowsContent');
            flowsContent.textContent = data.key_flows || 'No key flows identified';

            // Show results and chat
            document.getElementById('results').classList.add('active');
            document.getElementById('chatSection').classList.add('active');
            
            // Clear previous chat
            document.getElementById('chatMessages').innerHTML = '';
        }

        let currentRepoData = null;

        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const question = input.value.trim();

            if (!question) return;

            if (!currentRepoUrl || !currentRepoData) {
                showError('Please analyze a repository first');
                return;
            }

            // Add user message to chat
            addChatMessage(question, 'user');
            input.value = '';

            // Show typing indicator
            const typingId = addChatMessage('Thinking...', 'assistant');

            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        github_url: currentRepoUrl,
                        question: question,
                        repo_data: currentRepoData
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.detail || `HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                
                // Check if there's an error in the response
                if (data.error) {
                    throw new Error(data.error);
                }
                
                // Remove typing indicator and add actual response
                document.getElementById(typingId).remove();
                addChatMessage(data.answer || 'No response available', 'assistant');
            } catch (error) {
                document.getElementById(typingId).remove();
                const errorMessage = error.message || String(error);
                addChatMessage(`Error: ${errorMessage}`, 'assistant');
                console.error('Chat error:', error);
            }
        }

        function addChatMessage(text, sender) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageId = `msg-${Date.now()}`;
            const messageDiv = document.createElement('div');
            messageDiv.id = messageId;
            messageDiv.className = `chat-message ${sender}`;
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return messageId;
        }

        function handleChatKeyPress(event) {
            if (event.key === 'Enter') {
                sendChatMessage();
            }
        }

        function showLoading(show) {
            const loading = document.getElementById('loading');
            const analyzeBtn = document.getElementById('analyzeBtn');
            
            if (show) {
                loading.classList.add('active');
                analyzeBtn.disabled = true;
            } else {
                loading.classList.remove('active');
                analyzeBtn.disabled = false;
            }
        }

        function hideResults() {
            document.getElementById('results').classList.remove('active');
            document.getElementById('chatSection').classList.remove('active');
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = message;
            errorDiv.classList.add('active');
        }

        function hideError() {
            document.getElementById('errorMsg').classList.remove('active');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Allow Enter key to trigger analysis
        document.getElementById('repoUrl').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                analyzeRepo();
            }
        });
    </script>
</body>
</html>
